# =============================================================================
# OnSig — Fly.io deployment config
# =============================================================================
#
# Lives at the monorepo root (onsig/) because the Docker build needs both
# `backend/` and `shared/` in scope. Run `flyctl deploy --remote-only` from
# this directory.
#
# Quick reference:
#   flyctl secrets set KEY=val          # write env to Fly's secret store
#   flyctl deploy                       # build + push + roll
#   flyctl logs                         # tail
#   flyctl ssh console                  # exec inside a running machine
#   flyctl status                       # current machines + health
#
# Region: `fra` (Frankfurt) — EU borders for KVKK, ~5 ms to Neon eu-central-1.
# =============================================================================

app          = "onsig-prod"
primary_region = "fra"

# ─── Build ─────────────────────────────────────────────────────────────────
[build]
  dockerfile   = "Dockerfile"
  build-target = "runner"

# ─── Environment (non-secret) ──────────────────────────────────────────────
[env]
  NODE_ENV              = "production"
  PORT                  = "3001"
  LOG_LEVEL             = "info"
  NEXT_PUBLIC_APP_URL   = "https://onsig-prod.fly.dev"
  NEXT_PUBLIC_SEO_INDEXABLE = "false"

# ─── Release command ───────────────────────────────────────────────────────
# Disabled until we baseline `drizzle-kit generate` to produce migration files
# (initial schema was applied via `drizzle-kit push`).
[deploy]
  strategy = "rolling"

# ─── HTTP service ───────────────────────────────────────────────────────────
[http_service]
  internal_port        = 3001
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval     = "15s"
    method       = "get"
    timeout      = "5s"
    path         = "/api/health/live"
    protocol     = "http"

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 200

# ─── Machine sizing ────────────────────────────────────────────────────────
# Next.js standalone ~250 MB resident; @react-pdf spikes to ~500 MB during
# PDF generation. 1 GB at shared-cpu-1x is the sweet spot (~$5.70/month).
[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory    = "1gb"
  memory_mb = 1024

# ─── Processes ──────────────────────────────────────────────────────────────
[processes]
  app = "node backend/server.js"

# ─── Metrics ───────────────────────────────────────────────────────────────
[metrics]
  port = 9091
  path = "/metrics"
